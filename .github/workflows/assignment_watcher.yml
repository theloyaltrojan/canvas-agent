name: Canvas Assignment Watcher

on:
  schedule:
    - cron: "0 * * * *"   # Every hour — change to "*/30 * * * *" for every 30 min
  workflow_dispatch:        # Manual trigger for testing

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit the state file back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-requests

      - name: Install dependencies
        run: pip install requests

      - name: Run watcher
        env:
          CANVAS_TOKEN:      ${{ secrets.CANVAS_TOKEN }}
          CANVAS_DOMAIN:     ${{ secrets.CANVAS_DOMAIN }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          IGNORED_COURSES:   "PE,Stagecraft"

          # ── Which classes to watch ────────────────────────────────────────
          # Leave empty ("") to watch ALL classes (except ignored ones above).
          # Or list comma-separated substrings to watch only specific classes:
          #   WATCHED_CLASSES: "Algebra,Biology,Spanish"
          WATCHED_CLASSES:   ""

          # How many days ahead to look for assignments
          DAYS_AHEAD:        "60"

        run: python assignment_watcher.py

      - name: Commit updated state
        run: |
          git config user.name  "Canvas Bot"
          git config user.email "canvas-bot@noreply.github.com"
          git add state/seen_assignments.json
          git diff --staged --quiet || \
            git commit -m "chore: update watcher state [skip ci]" && \
            git push
